name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Unit Tests & Coverage
    runs-on: ubuntu-latest

    services:
      db:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd vuln-api
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Pytest with Coverage
        run: |
          cd vuln-api
          export ENCRYPTION_KEY=$(python -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          export DATABASE_URL="postgresql://test:test@localhost:5432/test"
          python -m pytest --cov=app --cov-report=xml:coverage.xml --junitxml=test-results.xml tests/

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: vuln-api/coverage.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: vuln-api/test-results.xml

  frontend-tests:
    name: Frontend Unit Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --silent

      - name: Run Tests with Coverage
        run: |
          cd frontend
          npm run test:coverage -- --run --reporter=junit --outputFile=test-results.xml || true

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  sonar-scan:
    name: SonarQube SAST Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Backend Coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: vuln-api

      - name: Download Frontend Coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@v2.0.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "http://18.218.47.7:9000"
        with:
          args: >
            -Dproject.settings=dev-tools/sonarqube/sonar-project.properties
            -Dsonar.projectBaseDir=.

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Create Backlog Issue on Quality Gate Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🔴 [DEUDA TÉCNICA] SonarQube Quality Gate falló en la rama '${{ github.ref_name }}'" \
            --body "El Quality Gate de SonarQube ha fallado. Revisa los detalles del reporte en SonarQube: http://18.218.47.7:9000. Este ticket fue autogenerado por el Pipeline de DevSecOps para mitigar la vulnerabilidad." \
            --label "bug"

      - name: Notify Slack on Quality Gate Failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "text": "🚨 *DevSecOps Pipeline Alert*: El Quality Gate de SonarQube ha fallado en la rama *${{ github.ref_name }}*. Se ha creado automáticamente un ticket de Deuda Técnica en el backlog para su asignación e investigación inmediata."
              }' \
              "${{ secrets.SLACK_WEBHOOK_URL }}"
          else
            echo "SLACK_WEBHOOK_URL no está configurado. Saltando notificación de Slack..."
          fi

  trivy-sca:
    name: Trivy SCA Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy SCA Scan (Report HIGH and CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy SCA Scan (Fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

  owasp-zap-dast:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Start Services under Docker Compose
        run: |
          cp .env.example .env
          export ENCRYPTION_KEY=$(python -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          export SECRET_KEY="supersecret"
          sed -i "s|^ENCRYPTION_KEY=.*|ENCRYPTION_KEY=$ENCRYPTION_KEY|g" .env
          
          # Remove container_name to avoid potential naming conflicts in docker compose
          python -c "
          with open('docker-compose.yml') as f:
              lines = f.readlines()
          out = [line for line in lines if 'container_name:' not in line]
          with open('docker-compose.yml', 'w') as f:
              f.write(''.join(out))
          "
          docker compose up -d db-api api

      - name: Wait for API to respond
        run: |
          echo "Waiting for API to respond on port 8000..."
          for i in {1..60}; do
            if curl -s -f http://localhost:8000/docs >/dev/null; then
              echo "API is up and responding!"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to respond!"
          docker compose logs
          exit 1

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8000/docs'
          cmd_options: '-I'
          allow_issue_writing: false

      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report_html.html
